<!DOCTYPE HTML>

<head>
	<title>Handwrote</title>
	<meta http-equiv="Content-type" name="viewport"
		content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no, width=device-width">

	<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>

	<script src="js/firebase-init.js"></script>

	<script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
	<link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />

	<link rel="stylesheet" href="css/style.css">
	</link>
</head>

<body>
	<h1>Handwrote</h1>
	<div class="center">
		A writing club
	</div>
	<hr>
	<button class="login-hide" onclick="login()">Log in with Google</button>
	<div class="hidden login-show">
		<p>Logged in as <img id="user-img"> <span id="user-name">John Pork</span></p>
		<button onclick="logout()">Log out</button>
	</div>
	<hr>
	<div class="hidden login-show">
		<form onsubmit="handleFormSubmit(event)">
			<table>
				<tr>
					<td>
						<label>Title (optional): </label>
					</td>
					<td>
						<input class="stretch" name="title" id="title"></input>
					</td>
				</tr>

				<tr>
					<td>
						<label>Your (preferred/pen) name: </label>
					</td>
					<td>
						<input class="stretch" name="writer" id="writer"></input>
					</td>
				</tr>
				<tr>
					<td>
						<label>Submitting for week: </label>
					</td>
					<td>
						<select name="week" id="week-select"></select>
					</td>
				</tr>

			</table>
			<label class="block">Content: </label>
			<textarea class="block" name="content" id="content"></textarea>
			<input type="submit"></input>
		</form>
	</div>
	<p class="login-hide">Please log in to submit essays</p>
</body>
<script src="js/auth-init.js"></script>
<script src="js/firebase-submit.js"></script>
